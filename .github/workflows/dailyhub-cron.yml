name: DailyHub Scheduled Jobs

on:
  schedule:
    # Run every 15 minutes. GitHub schedules use UTC.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Manual testing: run all tasks now and send Telegram for every topic. Scheduled cron still uses false."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  trigger-cron-api:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate cron secrets
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${CRON_URL}" ]; then
            echo "Missing GitHub secret: CRON_URL"
            exit 1
          fi

          if [ -z "${CRON_SECRET}" ]; then
            echo "Missing GitHub secret: CRON_SECRET"
            exit 1
          fi

          echo "CRON_URL is configured"
          echo "CRON_SECRET is configured"

      - name: Trigger DailyHub cron API
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
        run: |
          set -euo pipefail

          target_url="${CRON_URL}"
          if [ "${FORCE_RUN}" = "true" ]; then
            separator="?"
            if echo "${target_url}" | grep -q "?"; then
              separator="&"
            fi
            target_url="${target_url}${separator}force=true"
            echo "Force run is enabled for this manual workflow run."
          fi

          response=$(curl -sS -L -w "\n%{http_code}" -X GET "${target_url}" \
            -H "Authorization: Bearer ${CRON_SECRET}")

          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n 1)

          echo "HTTP status: $status"
          echo "Response body:"
          echo "$body"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Cron API failed with HTTP $status"
            exit 1
          fi
